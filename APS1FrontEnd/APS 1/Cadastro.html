<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
    <h1> Informações Pessoais </h1>
    <form action="Obrigado2.html" method="get">
            <fieldset>
                <legend> Cadastro do Cliente </legend>
                <p>
                    <label for="Nome:"> Nome: </label>
                    <input type="text" id="Nome:" name="Nome:" placeholder="Digite o nome do cliente" size="70px">
                </p>
                <p>
                    <label for="Idade:"> Idade: </label>
                    <input type="text" id="Idade:" name="Idade:" placeholder="Digite a idade" size="10px">
                </p>
                <p>
                    <label for="Endereço:"> Endereço: </label> <br>
                    <input type="text" id="Endereço:" name="Endereço:" placeholder="Digite o endereço" size="100px">
                </p>
                <p>
                    <label for="Cidade:"> Cidade: </label>
                    <input type="text" id="Cidade:" name="Cidade:" placeholder="Digite a cidade" size="70px">
                </p>
                <p>
                    <label for="Estado:"> Estado: </label>
                    <input type="text" id="Estado:" name="Estado:" placeholder="UF" size="1px">
                </p>
                <p>
                    <label for="CEP:"> CEP: </label>
                    <input type="text" id="CEP:" name="CEP:" placeholder="XXXXX-XXX" size="10px">
                </p>
                <p>
                    <label for="Tel/Res:"> Tel/Res: </label>
                    <input type="text" id="Tel/Res:" name="Tel/Res:" placeholder="99 99999-9999" size="10px">
                </p>
                <p>
                    <label for="Tel/Cel:"> Tel/Cel: </label>
                    <input type="text" id="Tel/Cel:" name="Tel/Cel:" placeholder="99 99999-9999" size="10px">
                </p>
                <p>
                    <label for="Email:"> Email: </label> <br>
                    <input type="text" id="Email:" name="Email:" placeholder="Digite o endereço de email" size="100px">
                </p>
            </fieldset>
            <input type="submit">
    </form>
</body>
</html>
